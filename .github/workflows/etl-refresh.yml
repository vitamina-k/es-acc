name: ETL Refresh — Datos Oficiales

# Ejecución automática cada 3 días a las 05:00 UTC (07:00 España)
# También se puede lanzar manualmente desde GitHub Actions
on:
  schedule:
    - cron: '0 5 */3 * *'   # cada 3 días
  workflow_dispatch:
    inputs:
      sources:
        description: 'Pipelines a ejecutar (separados por coma, o "all")'
        required: false
        default: 'all'
      data_dir:
        description: 'Directorio de datos temporales'
        required: false
        default: '/tmp/vigilia-etl'

permissions:
  contents: read

concurrency:
  group: etl-refresh
  cancel-in-progress: false   # nunca cancelar una carga en curso

jobs:
  etl:
    name: ETL — ${{ github.event.inputs.sources || 'all' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar uv
        uses: astral-sh/setup-uv@v4
        with:
          version: 'latest'

      - name: Instalar dependencias ETL
        working-directory: etl
        run: uv sync --no-dev

      - name: Ejecutar pipelines
        working-directory: etl
        env:
          NEO4J_URI:      ${{ secrets.NEO4J_URI }}
          NEO4J_USER:     ${{ secrets.NEO4J_USER }}
          NEO4J_PASSWORD: ${{ secrets.NEO4J_PASSWORD }}
          NEO4J_DATABASE: ${{ secrets.NEO4J_DATABASE || 'neo4j' }}
        run: |
          DATA_DIR="${{ github.event.inputs.data_dir || '/tmp/vigilia-etl' }}"
          SOURCES="${{ github.event.inputs.sources || 'all' }}"
          mkdir -p "$DATA_DIR"

          # Lista de todos los pipelines activos
          ALL_SOURCES="congreso contratos_estado cnmc cnmv aepd registro_concursal tgss_deudores"

          if [ "$SOURCES" = "all" ]; then
            SOURCES_LIST="$ALL_SOURCES"
          else
            SOURCES_LIST=$(echo "$SOURCES" | tr ',' ' ')
          fi

          echo "=== VIGILIA ETL — $(date -u '+%Y-%m-%d %H:%M UTC') ==="
          echo "Pipelines: $SOURCES_LIST"
          echo ""

          FAILED=()
          for src in $SOURCES_LIST; do
            echo "--- Pipeline: $src ---"
            if uv run esacc-etl run \
                --source "$src" \
                --neo4j-uri "$NEO4J_URI" \
                --neo4j-user "${NEO4J_USER:-neo4j}" \
                --neo4j-password "$NEO4J_PASSWORD" \
                --data-dir "$DATA_DIR/$src"; then
              echo "✓ $src completado"
            else
              echo "✗ $src FALLÓ"
              FAILED+=("$src")
            fi
            echo ""
          done

          echo "=== RESUMEN ==="
          if [ ${#FAILED[@]} -eq 0 ]; then
            echo "Todos los pipelines completados correctamente."
          else
            echo "FALLIDOS: ${FAILED[*]}"
            exit 1
          fi

      - name: Resumen en GitHub
        if: always()
        run: |
          echo "### ETL Vigilia — $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Pipelines ejecutados:** ${{ github.event.inputs.sources || 'all' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Fuentes activas:**" >> $GITHUB_STEP_SUMMARY
          echo "- congreso · contratos_estado · cnmc · cnmv · aepd · registro_concursal · tgss_deudores" >> $GITHUB_STEP_SUMMARY
